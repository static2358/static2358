name: Update language stats

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-language-stats:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Update README language stats
        run: python .github/scripts/update_language_stats.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USER: static2358

      - name: Commit changes
        run: |
          if [ -n "$(git status --porcelain README.md assets/language-stats.svg)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md assets/language-stats.svg
            git commit -m "Update language stats"
            git push
          else
            echo "README language stats already up to date."
          fi
